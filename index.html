<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我爱你</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
  background:linear-gradient(-45deg,#ffb3d9,#ff6aa9,#ff8fc2,#ffd6ea);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
  position:relative;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.text{
  position:absolute;
  top:45px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:64px;
  font-weight:700;
  text-shadow:0 4px 16px rgba(0,0,0,.18);
  z-index:20;
}

.bottom{
  position:absolute;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:28px;
  font-weight:700;
  text-shadow:0 3px 12px rgba(0,0,0,.18);
  animation:blink 1.2s infinite;
  z-index:20;
  white-space:nowrap;
}

@keyframes blink{
  50%{opacity:.5}
}

.heart{
  position:relative;
  width:360px;
  height:360px;
  background:#ff1744;
  transform:rotate(-45deg);
  animation:beat 1.2s infinite;
  box-shadow:0 0 40px rgba(255,23,68,.25);
}

@keyframes beat{
  0%,100%{transform:rotate(-45deg) scale(1)}
  50%{transform:rotate(-45deg) scale(1.08)}
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:360px;
  height:360px;
  background:#ff1744;
  border-radius:50%;
}

.heart::before{
  top:-180px;
  left:0;
}

.heart::after{
  top:0;
  left:180px;
}

.img-box{
  position:absolute;
  width:300px;
  height:300px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:50%;
  overflow:hidden;
  z-index:5;
  border:6px solid #fff;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}

.img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.floating{
  position:absolute;
  color:rgba(255,255,255,.28);
  animation:float 6s linear infinite;
  pointer-events:none;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

.burst{
  position:absolute;
  pointer-events:none;
}

.spark{
  position:absolute;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="text">我爱你</div>

<div class="heart">
  <div class="img-box">
    <img src="anh.jpg" alt="anh">
  </div>
</div>

<div class="bottom">Nhấp vào màn hình để tim bắn tùm lum ❤️</div>

<audio id="music" loop>
  <source src="bts.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");

window.onload = () => {
  music.play().catch(() => {});
};

document.addEventListener("click", e => {
  music.play().catch(() => {});
  burst(e.clientX, e.clientY);
  firework(e.clientX, e.clientY);
});

setInterval(() => {
  const h = document.createElement("div");
  h.className = "floating";
  h.innerHTML = "❤";
  h.style.left = Math.random() * 100 + "vw";
  h.style.fontSize = 18 + Math.random() * 24 + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 320);

function burst(x, y){
  const colors = ["red","pink","yellow","blue","purple","orange"];
  for(let i = 0; i < 30; i++){
    const h = document.createElement("div");
    h.className = "burst";
    h.innerHTML = "❤";

    const angle = Math.random() * Math.PI * 2;
    const dist = 120 + Math.random() * 160;

    h.style.left = x + "px";
    h.style.top = y + "px";
    h.style.color = colors[Math.floor(Math.random() * colors.length)];
    h.style.fontSize = 18 + Math.random() * 24 + "px";

    document.body.appendChild(h);

    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const start = performance.now();

    function anim(t){
      const p = (t - start) / 900;
      if(p > 1){
        h.remove();
        return;
      }
      h.style.transform = `translate(${dx * p}px, ${dy * p}px)`;
      h.style.opacity = 1 - p;
      requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
  }
}

function firework(x, y){
  const colors = ["#fff","#ffd700","#00e5ff","#ff66cc","#7c4dff","#ff9800"];
  for(let i = 0; i < 26; i++){
    const s = document.createElement("div");
    s.className = "spark";
    s.innerHTML = "✦";

    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 140;

    s.style.left = x + "px";
    s.style.top = y + "px";
    s.style.color = colors[Math.floor(Math.random() * colors.length)];
    s.style.fontSize = 14 + Math.random() * 12 + "px";

    document.body.appendChild(s);

    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const start = performance.now();

    function anim(t){
      const p = (t - start) / 850;
      if(p > 1){
        s.remove();
        return;
      }
      s.style.transform = `translate(${dx * p}px, ${dy * p}px)`;
      s.style.opacity = 1 - p;
      requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
  }
}
</script>

</body>
</html>
