<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我爱你</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(-45deg, #ff9ecf, #ff5fa2, #ff84c1, #ffd1e8);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .top-text {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 56px;
      font-weight: 700;
      text-shadow: 0 4px 18px rgba(0,0,0,.2);
      z-index: 20;
      animation: glow 1.8s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.06); }
    }

    .bottom-text {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      text-shadow: 0 3px 12px rgba(0,0,0,.2);
      z-index: 20;
      animation: blink 1.4s ease-in-out infinite;
      white-space: nowrap;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: .55; }
    }

    .bg-heart {
      position: absolute;
      color: rgba(255,255,255,.28);
      pointer-events: none;
      animation: floatUp linear forwards;
      z-index: 1;
    }

    @keyframes floatUp {
      from {
        transform: translateY(20px) scale(.8);
        opacity: 0;
      }
      20% { opacity: 1; }
      to {
        transform: translateY(-110vh) scale(1.4);
        opacity: 0;
      }
    }

    .center {
      position: relative;
      width: 360px;
      height: 330px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .heart-shape {
      position: absolute;
      width: 220px;
      height: 220px;
      background: #ff1e3c;
      transform: rotate(-45deg);
      animation: beat 1.3s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(255, 30, 60, .35);
    }

    .heart-shape::before,
    .heart-shape::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      background: #ff1e3c;
      border-radius: 50%;
    }

    .heart-shape::before {
      top: -110px;
      left: 0;
    }

    .heart-shape::after {
      top: 0;
      left: 110px;
    }

    @keyframes beat {
      0%,100% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.08); }
    }

    .photo-wrap {
      position: relative;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 12;
      border: 6px solid #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,.18);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .burst-heart,
    .firework {
      position: absolute;
      pointer-events: none;
      user-select: none;
      z-index: 50;
      will-change: transform, opacity;
    }
  </style>
</head>
<body>
  <div class="top-text">我爱你</div>

  <div class="center">
    <div class="heart-shape"></div>
    <div class="photo-wrap">
      <img src="anh.jpg" alt="photo">
    </div>
  </div>

  <div class="bottom-text">点击屏幕，让爱心绽放</div>

  <audio id="music" loop preload="auto">
    <source src="bts.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("music");
    let musicStarted = false;

    function startMusic() {
      if (musicStarted) return;
      music.play().then(() => {
        musicStarted = true;
      }).catch(() => {
      });
    }

    function createFloatingHeart() {
      const el = document.createElement("div");
      el.className = "bg-heart";
      el.textContent = "❤";
      el.style.left = Math.random() * 100 + "vw";
      el.style.bottom = "-30px";
      el.style.fontSize = (16 + Math.random() * 22) + "px";
      el.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 8500);
    }

    setInterval(createFloatingHeart, 260);

    function burstHearts(x, y) {
      const colors = ["#ff1744", "#ff4fa3", "#ffd400", "#7c4dff", "#00c2ff", "#ff7a00"];
      for (let i = 0; i < 34; i++) {
        const h = document.createElement("div");
        h.className = "burst-heart";
        h.textContent = "❤";
        const size = 14 + Math.random() * 24;
        const angle = Math.random() * Math.PI * 2;
        const distance = 70 + Math.random() * 180;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        const rotate = Math.random() * 600 - 300;
        const duration = 900 + Math.random() * 700;

        h.style.left = x + "px";
        h.style.top = y + "px";
        h.style.fontSize = size + "px";
        h.style.color = colors[Math.floor(Math.random() * colors.length)];
        h.style.opacity = "1";
        h.style.transform = "translate(-50%, -50%)";

        document.body.appendChild(h);

        const start = performance.now();
        function animate(now) {
          const t = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          h.style.transform =
            `translate(calc(-50% + ${dx * ease}px), calc(-50% + ${dy * ease}px)) rotate(${rotate * ease}deg) scale(${1 - t * 0.35})`;
          h.style.opacity = String(1 - t);
          if (t < 1) requestAnimationFrame(animate);
          else h.remove();
        }
        requestAnimationFrame(animate);
      }
    }

    function launchFirework(x, y) {
      const colors = ["#ff1744", "#ffd600", "#00e5ff", "#76ff03", "#ff6d00", "#e040fb", "#ffffff"];
      for (let i = 0; i < 42; i++) {
        const p = document.createElement("div");
        p.className = "firework";
        p.textContent = "✦";
        const size = 10 + Math.random() * 12;
        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 170;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        const duration = 900 + Math.random() * 600;

        p.style.left = x + "px";
        p.style.top = y + "px";
        p.style.fontSize = size + "px";
        p.style.color = colors[Math.floor(Math.random() * colors.length)];
        p.style.opacity = "1";
        p.style.transform = "translate(-50%, -50%)";

        document.body.appendChild(p);

        const start = performance.now();
        function animate(now) {
          const t = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          p.style.transform = `translate(calc(-50% + ${dx * ease}px), calc(-50% + ${dy * ease}px)) scale(${1 - t * 0.5})`;
          p.style.opacity = String(1 - t);
          if (t < 1) requestAnimationFrame(animate);
          else p.remove();
        }
        requestAnimationFrame(animate);
      }
    }

    function magicAt(x, y) {
      burstHearts(x, y);
      launchFirework(x, y);
    }

    document.addEventListener("click", (e) => {
      startMusic();
      magicAt(e.clientX, e.clientY);
    });

    document.addEventListener("touchstart", (e) => {
      startMusic();
      const t = e.touches[0];
      magicAt(t.clientX, t.clientY);
    }, { passive: true });

    setInterval(() => {
      const x = 150 + Math.random() * (window.innerWidth - 300);
      const y = 140 + Math.random() * (window.innerHeight - 260);
      launchFirework(x, y);
    }, 2200);
  </script>
</body>
</html>
