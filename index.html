<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我爱你</title>

<style>
body {
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(-45deg,#ff9acb,#ff4d88,#ff9acb);
  background-size:400% 400%;
  animation:bgMove 8s infinite;
}

@keyframes bgMove {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* chữ trên */
.text {
  position:absolute;
  top:50px;
  color:#fff;
  font-size:60px;
  font-weight:bold;
}

/* chữ dưới */
.bottom {
  position:absolute;
  bottom:30px;
  color:#fff;
  font-size:26px;
  font-weight:600;
  animation:blink 1.2s infinite;
}

@keyframes blink {
  50%{opacity:.5}
}

/* TIM */
.heart {
  position:relative;
  width:340px;
  height:340px;
  background:red;
  transform:rotate(-45deg);
  animation:beat 1.2s infinite;
}

@keyframes beat {
  0%,100%{transform:rotate(-45deg) scale(1)}
  50%{transform:rotate(-45deg) scale(1.1)}
}

.heart:before,
.heart:after {
  content:"";
  position:absolute;
  width:340px;
  height:340px;
  background:red;
  border-radius:50%;
}

.heart:before { top:-170px; }
.heart:after { left:170px; }

/* ẢNH TO HƠN NỮA */
.img-box {
  position:absolute;
  width:260px;
  height:260px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:50%;
  overflow:hidden;
  z-index:5;
}

.img-box img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* tim bay nền */
.floating {
  position:absolute;
  color:rgba(255,255,255,.3);
  animation:float 6s linear infinite;
}

@keyframes float {
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

.burst {
  position:absolute;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="text">我爱你</div>

<div class="heart">
  <div class="img-box">
    <img src="anh.jpg">
  </div>
</div>

<div class="bottom">Nhấn vào màn hình để tim bắn tùm lum ❤️</div>

<audio id="music" loop>
  <source src="bts.mp3">
</audio>

<script>
const music = document.getElementById("music");

/* thử auto */
window.onload = () => {
  music.play().catch(()=>{});
};

/* click */
document.addEventListener("click", e => {
  music.play();
  burst(e.clientX,e.clientY);
});

/* tim bay nền */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="floating";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=20+Math.random()*25+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

/* tim nổ */
function burst(x,y){
  const colors=["red","pink","yellow","blue","purple","orange"];
  for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="burst";
    h.innerHTML="❤";

    let angle=Math.random()*Math.PI*2;
    let dist=120+Math.random()*150;

    h.style.left=x+"px";
    h.style.top=y+"px";
    h.style.color=colors[Math.floor(Math.random()*colors.length)];
    h.style.fontSize=18+Math.random()*25+"px";

    document.body.appendChild(h);

    let dx=Math.cos(angle)*dist;
    let dy=Math.sin(angle)*dist;
    let start=performance.now();

    function anim(t){
      let p=(t-start)/900;
      if(p>1){h.remove();return;}
      h.style.transform=`translate(${dx*p}px,${dy*p}px)`;
      h.style.opacity=1-p;
      requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
  }
}
</script>

</body>
</html>
