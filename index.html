<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我爱你</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#ff9acb, #ff4d88);
  overflow: hidden;
  font-family: Arial;
}

.text {
  position: absolute;
  top: 60px;
  color: white;
  font-size: 42px;
  font-weight: bold;
  z-index: 3;
}

.heart {
  position: relative;
  width: 260px;
  height: 240px;
  background: red;
  transform: rotate(-45deg);
  animation: beat 1.2s infinite;
}

@keyframes beat {
  0%,100% { transform: rotate(-45deg) scale(1); }
  50% { transform: rotate(-45deg) scale(1.08); }
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 260px;
  height: 240px;
  background: red;
  border-radius: 50%;
}

.heart::before { top: -120px; }
.heart::after { left: 120px; }

.img-box {
  position: absolute;
  width: 180px;
  height: 180px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  overflow: hidden;
  border-radius: 50%;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.burst {
  position: absolute;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="text">我爱你</div>

<div class="heart">
  <div class="img-box">
    <img src="anh.jpg">
  </div>
</div>

<!-- NHẠC -->
<audio id="music" autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0c1f.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");

/* fix autoplay bị chặn */
document.addEventListener("click", () => {
  music.play();
}, { once: true });

function burst(x,y){
  const colors=["red","pink","yellow","blue","purple","orange"];
  for(let i=0;i<25;i++){
    let h=document.createElement("div");
    h.className="burst";
    h.innerHTML="❤";

    let angle=Math.random()*Math.PI*2;
    let dist=100+Math.random()*120;

    h.style.left=x+"px";
    h.style.top=y+"px";
    h.style.color=colors[Math.floor(Math.random()*colors.length)];
    h.style.fontSize=15+Math.random()*20+"px";

    document.body.appendChild(h);

    let dx=Math.cos(angle)*dist;
    let dy=Math.sin(angle)*dist;
    let start=performance.now();

    function anim(t){
      let p=(t-start)/800;
      if(p>1){h.remove();return;}
      h.style.transform=`translate(${dx*p}px,${dy*p}px)`;
      h.style.opacity=1-p;
      requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
  }
}

document.onclick=e=>burst(e.clientX,e.clientY);
</script>

</body>
</html>
